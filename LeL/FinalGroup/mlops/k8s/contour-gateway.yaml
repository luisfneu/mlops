apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mlops-poc-gateway
  namespace: mlops-poc
spec:
  gatewayClassName: contour
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: failure-model-api-route
  namespace: mlops-poc
spec:
  parentRefs:
    - name: mlops-poc-gateway
  hostnames:
    - failure-model-api.mlops.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: failure-model-api
          port: 80
          weight: 100
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mlflow-route
  namespace: mlops-poc
spec:
  parentRefs:
    - name: mlops-poc-gateway
  hostnames:
    - mlflow.mlops.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mlflow
          port: 5000
          weight: 100
